<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF Editor | ConvertLab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="js/scripts.js" defer></script>
  </head>
  <body class="pdf-page">
    <header class="site-header">
      <div class="header-row">
        <a href="index.html" class="brand">ConvertLab</a>
        <div class="nav-box">
          <button class="nav-item tools-button" id="toolsButton" type="button">
            Tools
            <img src="assets/ab375987a2a63c040425f451c0122d4a.svg" alt="arrow" />
          </button>
          <div class="tools-menu" id="toolsMenu" aria-label="Tools menu">
            <a class="tools-menu-item" href="ascii.html">ASCII Converter</a>
            <a class="tools-menu-item" href="pdf-editor.html">PDF Editor</a>
            <a class="tools-menu-item" href="rc4.html">RC4 Encryption</a>
            <a class="tools-menu-item" href="steganography.html">Steganography</a>
          </div>
          <a class="nav-item" href="index.html#features">Docs</a>
          <a class="nav-item" href="https://github.com/Allkfii" target="_blank" rel="noopener noreferrer">Github</a>
        </div>
      </div>
    </header>
    <main class="tool-page-main">
      <div class="page-pill">PDF Editor</div>
      
      <!-- View 1: Initial View -->
      <div class="pdf-state-view" id="pdfInitialView">
        <h1 class="pdf-title">PDF Editor</h1>
        <p class="pdf-subtitle">Convert images to PDF or extract PDF pages to JPG instantly</p>
        
        <div class="pdf-upload-container" id="pdfDropZone">
          <div class="upload-btn-row">
            <button type="button" class="upload-select-btn" id="pdfSelectFileBtn">Select a file</button>
          </div>
          
          <input type="file" id="pdfFileInput" style="display: none;" multiple accept="image/jpeg,image/png,image/jpg,application/pdf" />
          <span class="drag-label">or drag JPGs / PDFs here.</span>
        </div>
      </div>

      <!-- View 2: Preview/Card View -->
      <div class="pdf-state-view" id="pdfPreviewView" style="display: none; width: 100%; max-width: 820px;">
        <div class="pdf-large-card">
          <div class="pdf-card-header-row">
            <div class="upload-btn-row" style="justify-content: flex-start; width: auto;">
              <button type="button" class="pdf-white-select-btn" id="pdfAddMoreBtn">Add more files</button>
              <button type="button" class="pdf-white-dropdown-btn" id="pdfDropdownBtn2" title="Settings">
                <svg viewBox="0 0 24 24" width="18" height="18"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2"/></svg>
              </button>
              
              <!-- Options Menu 2 -->
              <div class="upload-options-menu" id="pdfOptionsMenu2" style="left: 0; transform: translateY(-10px);">
                <div class="option-item">
                  <label for="pdfPageSize2">Page size :</label>
                  <select id="pdfPageSize2" class="pdf-select">
                    <option value="fit" selected>Fit image size</option>
                    <option value="a4">A4 size</option>
                    <option value="letter">Letter size</option>
                  </select>
                </div>
                <div class="option-item">
                  <label for="pdfOrientation2">Orientation :</label>
                  <select id="pdfOrientation2" class="pdf-select">
                    <option value="auto" selected>Auto</option>
                    <option value="portrait">Portrait</option>
                    <option value="landscape">Landscape</option>
                  </select>
                </div>
                <div class="option-item">
                  <label for="pdfMargin2">Margin :</label>
                  <select id="pdfMargin2" class="pdf-select">
                    <option value="none" selected>None</option>
                    <option value="small">Small (10pt)</option>
                    <option value="medium">Medium (20pt)</option>
                  </select>
                </div>
              </div>
            </div>
          </div>
          
          <div class="pdf-file-list" id="pdfFileList">
            <!-- Dynamic file rows -->
          </div>
          
          <div class="pdf-card-footer">
            <button type="button" id="pdfConvertBtn" class="pdf-convert-btn">Convert</button>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
