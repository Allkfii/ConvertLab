    <header class="site-header">

        <a href="index.html" class="brand">ConvertLab</a>
        <div class="nav-box">
          <button class="nav-item tools-button" id="toolsButton" type="button">

        <div class="rc4-field-row">
          <label for="plaintextInput">Plaintext</label>
          <input type="text" id="plaintextInput" autocomplete="off" />
        </div>
        
        <div class="rc4-action-row">
          <button type="button" id="encryptBtn" class="rc4-btn">Encrypt</button>
